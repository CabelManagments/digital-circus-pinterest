<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Amazing Digital Pinterest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #6c5ce7 100%);
            font-family: 'Segoe UI', 'Comic Neue', cursive, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "✦ ⚡ ★ ✿ ♠ ♣ ♥ ♦ ✦ ⚡ ★ ✿";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            font-size: 30px;
            color: rgba(255, 255, 255, 0.1);
            white-space: nowrap;
            pointer-events: none;
            animation: slide 20s linear infinite;
            z-index: 0;
        }

        @keyframes slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ffd93d;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ffd93d, #ff6b9d, #a8e6cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            animation: bounce 2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .circus-btn {
            background: linear-gradient(135deg, #ffd93d, #ff6b9d);
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #2c1a4a;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            font-family: inherit;
        }

        .circus-btn:hover {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .pins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .pin-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid #ffd93d;
            position: relative;
            animation: cardFloat 0.5s ease;
        }

        @keyframes cardFloat {
            from {
                opacity: 0;
                transform: translateY(30px) rotate(2deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }

        .pin-card:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border-color: #ff6b9d;
        }

        .pin-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #f0f0f0;
        }

        .pin-info {
            padding: 15px;
        }

        .pin-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #c44569;
            margin-bottom: 5px;
        }

        .pin-desc {
            color: #666;
            font-size: 0.9em;
            margin: 8px 0;
        }

        .pin-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            flex-wrap: wrap;
            gap: 8px;
        }

        .like-btn, .download-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
            padding: 5px 8px;
            border-radius: 15px;
        }

        .like-btn {
            color: #ff6b9d;
        }

        .download-btn {
            color: #00b894;
        }

        .delete-btn {
            color: #ff4757;
        }

        .like-btn:hover, .download-btn:hover, .delete-btn:hover {
            transform: scale(1.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: linear-gradient(135deg, #fff, #ffeaa7);
            padding: 30px;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid #ffd93d;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #c44569;
            border-radius: 15px;
            font-family: inherit;
        }

        .modal-content input[type="file"] {
            border: none;
            padding: 5px;
        }

        .status-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
            font-family: monospace;
        }
    </style>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>🎪 THE AMAZING DIGITAL PINTEREST 🎭</h1>
        <p style="color: white; margin-top: 10px;">✨ Добро пожаловать в Цифровой Цирк! Делитесь самыми безумными пинами ✨</p>
        <button class="circus-btn" onclick="openAddPinModal()">🎨 Добавить новый пин</button>
    </div>

    <div class="pins-grid" id="pinsGrid"></div>

    <div id="pinModal" class="modal">
        <div class="modal-content">
            <h2 style="color: #c44569;">🎪 Новое представление!</h2>
            <input type="text" id="pinTitle" placeholder="Название пина" required>
            <input type="text" id="pinAuthor" placeholder="Ваше имя (артист цирка)">
            <textarea id="pinDesc" rows="3" placeholder="Описание..."></textarea>
            <input type="file" id="pinImage" accept="image/*" required>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="circus-btn" onclick="createPin()" style="flex: 1;">🎪 Опубликовать</button>
                <button class="circus-btn" onclick="closeModal()" style="background: #666;">❌ Отмена</button>
            </div>
        </div>
    </div>

    <div class="status-badge" id="status">🔄 Connecting...</div>

    <script>
        let currentImageBase64 = null;
        let currentImageMime = null;
        let socket = null;

        function initSocket() {
            socket = io({
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionAttempts: 10
            });

            socket.on('connect', () => {
                document.getElementById('status').innerHTML = '🎪 Connected to Circus';
                document.getElementById('status').style.color = '#0f0';
            });

            socket.on('disconnect', () => {
                document.getElementById('status').innerHTML = '⚠️ Disconnected';
                document.getElementById('status').style.color = '#ff0';
            });

            socket.on('connect_error', () => {
                document.getElementById('status').innerHTML = '🔌 No WebSockets (polling mode)';
                document.getElementById('status').style.color = '#f90';
            });

            socket.on('new_pin', (pin) => {
                const grid = document.getElementById('pinsGrid');
                const card = createPinCard(pin);
                grid.insertBefore(card, grid.firstChild);
            });

            socket.on('like_update', (data) => {
                const likeBtn = document.querySelector(`.like-btn[data-id='${data.id}']`);
                if (likeBtn) {
                    likeBtn.innerHTML = `❤️ ${data.likes}`;
                }
            });

            socket.on('delete_pin', (data) => {
                const card = document.querySelector(`.pin-card[data-id='${data.id}']`);
                if (card) {
                    card.remove();
                }
            });
        }

        async function loadPins() {
            try {
                const response = await fetch('/api/pins');
                const pins = await response.json();
                const grid = document.getElementById('pinsGrid');
                grid.innerHTML = '';
                pins.forEach(pin => grid.appendChild(createPinCard(pin)));
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        function createPinCard(pin) {
            const card = document.createElement('div');
            card.className = 'pin-card';
            card.setAttribute('data-id', pin.id);
            card.innerHTML = `
                <img class="pin-image" src="${pin.image_data}" alt="${pin.title}">
                <div class="pin-info">
                    <div class="pin-title">🎪 ${escapeHtml(pin.title)}</div>
                    <div class="pin-desc">${escapeHtml(pin.description || '')}</div>
                    <div class="pin-meta">
                        <span>🎭 ${escapeHtml(pin.author)}</span>
                        <div>
                            <button class="like-btn" data-id="${pin.id}" onclick="likePin(${pin.id}, this)">❤️ ${pin.likes}</button>
                            <button class="download-btn" onclick="downloadImage('${pin.image_data}', '${escapeHtml(pin.title)}')">💾 Скачать</button>
                            <button class="delete-btn" onclick="deletePin(${pin.id})">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
            return card;
        }

        function downloadImage(imageData, filename) {
            const link = document.createElement('a');
            link.href = imageData;
            link.download = `circus_${filename.replace(/[^a-zа-яё0-9]/gi, '_')}.jpg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            const status = document.getElementById('status');
            const originalText = status.innerHTML;
            status.innerHTML = '💾 Картинка сохранена в галерею!';
            status.style.color = '#0f0';
            setTimeout(() => {
                status.innerHTML = originalText;
            }, 2000);
        }

        function openAddPinModal() {
            document.getElementById('pinModal').style.display = 'flex';
            document.getElementById('pinTitle').value = '';
            document.getElementById('pinAuthor').value = '';
            document.getElementById('pinDesc').value = '';
            document.getElementById('pinImage').value = '';
            currentImageBase64 = null;
        }

        function closeModal() {
            document.getElementById('pinModal').style.display = 'none';
        }

        document.getElementById('pinImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageBase64 = event.target.result;
                    currentImageMime = file.type;
                };
                reader.readAsDataURL(file);
            }
        });

        async function createPin() {
            const title = document.getElementById('pinTitle').value.trim();
            const author = document.getElementById('pinAuthor').value.trim() || 'Анонимный артист';
            const description = document.getElementById('pinDesc').value.trim();
            
            if (!title) {
                alert('Название пина обязательно! 🎪');
                return;
            }
            if (!currentImageBase64) {
                alert('Выберите изображение! 🎨');
                return;
            }
            
            const pinData = {
                title: title,
                author: author,
                description: description,
                image_data: currentImageBase64,
                image_mime: currentImageMime
            };
            
            try {
                const response = await fetch('/api/pins', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pinData)
                });
                if (response.ok) {
                    closeModal();
                } else {
                    alert('Ошибка при создании пина 😢');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Ошибка соединения с сервером');
            }
        }
        
        async function likePin(pinId, button) {
            try {
                await fetch(`/api/pins/${pinId}/like`, { method: 'POST' });
            } catch (error) {
                console.error('Like error:', error);
            }
        }
        
        async function deletePin(pinId) {
            if (confirm('Удалить этот пин из цирка? 🎪')) {
                try {
                    await fetch(`/api/pins/${pinId}`, { method: 'DELETE' });
                } catch (error) {
                    console.error('Delete error:', error);
                }
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('pinModal');
            if (event.target === modal) closeModal();
        }
        
        initSocket();
        loadPins();
    </script>
</body>
</html>
